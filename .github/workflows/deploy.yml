name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Test SSH Connection
        continue-on-error: true
        run: |
          echo "Testing SSH connection to ${{ secrets.EC2_HOST }}..."
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=10 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'SSH connection successful'"

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_RDS }}
        timeout-minutes: 10
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            
            echo "=========================================="
            echo "Starting deployment..."
            echo "=========================================="
            
            # Navigate to project directory or clone if not exists
            if [ ! -d "Rest_Api_Documentation" ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git
              cd Rest_Api_Documentation
            else
              echo "Updating repository..."
              cd Rest_Api_Documentation
              git fetch origin
              git reset --hard origin/main
              git pull origin main
            fi
            
            # Create .env.docker file with secrets
            echo "Creating .env.docker file..."
            cat > backend/.env.docker << EOF
          port=5000
          DATABASE_URL="${{ secrets.DATABASE_URL }}"
          NODE_ENV=production
          LOG_LEVEL=info
          EOF
            
            # Stop existing containers
            echo "Stopping existing containers..."
            docker compose down || true
            
            # Remove old images to free space
            echo "Cleaning up old images..."
            docker image prune -af || true
            
            # Build and start services
            echo "Building and starting services..."
            docker compose up -d --build
            
            # Wait for services to be healthy
            echo "Waiting for services to be ready..."
            sleep 15
            
            # Check service status
            echo "=========================================="
            echo "Service Status:"
            echo "=========================================="
            docker compose ps
            
            # Check API health
            echo "=========================================="
            echo "Checking API health..."
            echo "=========================================="
            sleep 5
            curl -f http://localhost:5001/health || echo "Health check failed, but continuing..."
            
            echo "=========================================="
            echo "Deployment completed successfully!"
            echo "=========================================="
          ENDSSH

      - name: Run Post-Deployment Tests
        run: |
          echo "=========================================="
          echo "Running Post-Deployment API Tests..."
          echo "=========================================="
          
          # Wait for services to stabilize
          echo "Waiting for services to stabilize..."
          sleep 10
          
          # Test 1: Health Check
          echo "Test 1: Health Check Endpoint"
          HEALTH_RESPONSE=$(curl -s -w "\n%{http_code}" http://${{ secrets.EC2_HOST }}:5001/health)
          HEALTH_CODE=$(echo "$HEALTH_RESPONSE" | tail -n1)
          if [ "$HEALTH_CODE" != "200" ]; then
            echo "❌ Health check failed with status: $HEALTH_CODE"
            exit 1
          fi
          echo "✅ Health check passed"
          
          # Test 2: Get Users Endpoint
          echo "Test 2: Get Users Endpoint"
          USERS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:5001/api/users)
          if [ "$USERS_CODE" != "200" ]; then
            echo "❌ Users endpoint failed with status: $USERS_CODE"
            exit 1
          fi
          echo "✅ Users endpoint passed"
          
          # Test 3: Get Products Endpoint
          echo "Test 3: Get Products Endpoint"
          PRODUCTS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:5001/api/products)
          if [ "$PRODUCTS_CODE" != "200" ]; then
            echo "❌ Products endpoint failed with status: $PRODUCTS_CODE"
            exit 1
          fi
          echo "✅ Products endpoint passed"
          
          # Test 4: Create User (POST test)
          echo "Test 4: Create User (POST Test)"
          CREATE_USER_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://${{ secrets.EC2_HOST }}:5001/api/users \
            -H "Content-Type: application/json" \
            -d '{"first_name":"Test","last_name":"User","email":"test-'$(date +%s)'@example.com","phone":"1234567890","password":"test123"}')
          if [ "$CREATE_USER_CODE" != "201" ]; then
            echo "❌ Create user failed with status: $CREATE_USER_CODE"
            exit 1
          fi
          echo "✅ Create user passed"
          
          # Test 5: Create Product (POST test)
          echo "Test 5: Create Product (POST Test)"
          CREATE_PRODUCT_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://${{ secrets.EC2_HOST }}:5001/api/products \
            -H "Content-Type: application/json" \
            -d '{"name":"Test Product '$(date +%s)'","description":"Automated test product","price":99.99,"stock_quantity":10}')
          if [ "$CREATE_PRODUCT_CODE" != "201" ]; then
            echo "❌ Create product failed with status: $CREATE_PRODUCT_CODE"
            exit 1
          fi
          echo "✅ Create product passed" 
          
          echo "=========================================="
          echo "✅ All 5 API tests passed successfully!"
          echo "=========================================="

      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo "✅ Deployment completed successfully!"
          echo "=========================================="
          echo "🌐 API URL: http://${{ secrets.EC2_HOST }}:5001"
          echo "🏥 Health Check: http://${{ secrets.EC2_HOST }}:5001/health"
          echo "📊 phpMyAdmin: http://${{ secrets.EC2_HOST }}:8080"
          echo "=========================================="
          echo "✅ All automated tests passed"
          echo "=========================================="

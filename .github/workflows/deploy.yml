name: Blue-Green Deployment with ALB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  blue-green-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Detect Active Environment
        id: detect
        run: |
          echo "=========================================="
          echo "Detecting current active environment..."
          echo "=========================================="
          
          # Set variables
          LISTENER_ARN="${{ secrets.ALB_LISTENER_ARN }}"
          
          # Get current target group from ALB listener
          CURRENT_TG=$(aws elbv2 describe-listeners \
            --listener-arns "${LISTENER_ARN}" \
            --query 'Listeners[0].DefaultActions[0].TargetGroupArn' \
            --output text)
          
          echo "Current Target Group: $CURRENT_TG"
          
          # Determine active and inactive environments
          if [[ "$CURRENT_TG" == "${{ secrets.BLUE_TARGET_GROUP_ARN }}" ]]; then
            echo "ACTIVE=BLUE" >> $GITHUB_OUTPUT
            echo "INACTIVE=GREEN" >> $GITHUB_OUTPUT
            echo "ACTIVE_HOST=${{ secrets.BLUE_EC2_HOST }}" >> $GITHUB_OUTPUT
            echo "INACTIVE_HOST=${{ secrets.GREEN_EC2_HOST }}" >> $GITHUB_OUTPUT
            echo "INACTIVE_TG_ARN=${{ secrets.GREEN_TARGET_GROUP_ARN }}" >> $GITHUB_OUTPUT
            echo "🔵 Blue is currently ACTIVE"
            echo "🟢 Green is INACTIVE - will deploy here"
          else
            echo "ACTIVE=GREEN" >> $GITHUB_OUTPUT
            echo "INACTIVE=BLUE" >> $GITHUB_OUTPUT
            echo "ACTIVE_HOST=${{ secrets.GREEN_EC2_HOST }}" >> $GITHUB_OUTPUT
            echo "INACTIVE_HOST=${{ secrets.BLUE_EC2_HOST }}" >> $GITHUB_OUTPUT
            echo "INACTIVE_TG_ARN=${{ secrets.BLUE_TARGET_GROUP_ARN }}" >> $GITHUB_OUTPUT
            echo "🟢 Green is currently ACTIVE"
            echo "🔵 Blue is INACTIVE - will deploy here"
          fi

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Deploy to Inactive Environment
        env:
          DEPLOY_HOST: ${{ steps.detect.outputs.INACTIVE_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_RDS }}
          ENVIRONMENT: ${{ steps.detect.outputs.INACTIVE }}
        timeout-minutes: 10
        run: |
          echo "=========================================="
          echo "Deploying to $ENVIRONMENT environment ($DEPLOY_HOST)..."
          echo "=========================================="
          
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=3 $EC2_USER@$DEPLOY_HOST << 'ENDSSH'
            set -e
            
            echo "Starting deployment on $(hostname)..."
            
            # Navigate to project directory or clone if not exists
            if [ ! -d "Rest_Api_Documentation" ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git
              cd Rest_Api_Documentation
            else
              echo "Updating repository..."
              cd Rest_Api_Documentation
              git fetch origin
              git reset --hard origin/main
              git pull origin main
            fi
            
            # Create .env.docker file
            echo "Creating .env.docker file..."
            cat > backend/.env.docker << EOF
          port=5000
          DATABASE_URL=${{ secrets.DATABASE_URL_RDS }}
          NODE_ENV=production
          LOG_LEVEL=info
          EOF
            
            # Stop existing containers
            echo "Stopping existing containers..."
            docker compose down || true
            
            # Remove old images to free space
            echo "Cleaning up old images..."
            docker image prune -af || true
            
            # Build and start services
            echo "Building and starting services..."
            docker compose up -d --build
            
            # Wait for services to be healthy
            echo "Waiting for services to be ready..."
            sleep 20
            
            # Check service status
            echo "=========================================="
            echo "Service Status:"
            docker compose ps
            echo "=========================================="
            
            # Check API health
            echo "Checking API health..."
            for i in {1..10}; do
              if curl -f http://localhost:5001/health > /dev/null 2>&1; then
                echo "✅ API is healthy!"
                break
              fi
              echo "Waiting for API... ($i/10)"
              sleep 3
            done
            
            echo "Deployment completed on $(hostname)!"
          ENDSSH

      - name: Run Tests on Inactive Environment
        env:
          TEST_HOST: ${{ steps.detect.outputs.INACTIVE_HOST }}
          ENVIRONMENT: ${{ steps.detect.outputs.INACTIVE }}
        run: |
          echo "=========================================="
          echo "Running tests on $ENVIRONMENT environment..."
          echo "=========================================="
          
          sleep 10
          
          # Test 1: Health Check
          echo "Test 1: Health Check"
          HEALTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$TEST_HOST:5001/health)
          if [ "$HEALTH_CODE" != "200" ]; then
            echo "❌ Health check failed"
            exit 1
          fi
          echo "✅ Health check passed"
          
          # Test 2: Get Users
          echo "Test 2: Get Users"
          USERS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$TEST_HOST:5001/api/users)
          if [ "$USERS_CODE" != "200" ]; then
            echo "❌ Users endpoint failed"
            exit 1
          fi
          echo "✅ Users endpoint passed"
          
          # Test 3: Get Products
          echo "Test 3: Get Products"
          PRODUCTS_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$TEST_HOST:5001/api/products)
          if [ "$PRODUCTS_CODE" != "200" ]; then
            echo "❌ Products endpoint failed"
            exit 1
          fi
          echo "✅ Products endpoint passed"
          
          # Test 4: Create User
          echo "Test 4: Create User"
          CREATE_USER_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://$TEST_HOST:5001/api/users \
            -H "Content-Type: application/json" \
            -d '{"first_name":"Test","last_name":"User","email":"test-'$(date +%s)'@example.com","phone":"1234567890","password":"test123"}')
          if [ "$CREATE_USER_CODE" != "201" ]; then
            echo "❌ Create user failed"
            exit 1
          fi
          echo "✅ Create user passed"
          
          # Test 5: Create Product
          echo "Test 5: Create Product"
          CREATE_PRODUCT_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://$TEST_HOST:5001/api/products \
            -H "Content-Type: application/json" \
            -d '{"name":"Test Product '$(date +%s)'","description":"Test","price":99.99,"stock_quantity":10}')
          if [ "$CREATE_PRODUCT_CODE" != "201" ]; then
            echo "❌ Create product failed"
            exit 1
          fi
          echo "✅ Create product passed"
          
          echo "=========================================="
          echo "✅ All tests passed on $ENVIRONMENT!"
          echo "=========================================="

      - name: Switch Traffic to New Environment
        env:
          NEW_TG_ARN: ${{ steps.detect.outputs.INACTIVE_TG_ARN }}
          NEW_ENV: ${{ steps.detect.outputs.INACTIVE }}
        run: |
          echo "=========================================="
          echo "Switching traffic to $NEW_ENV environment..."
          echo "=========================================="
          
          # Modify ALB listener to point to new target group
          aws elbv2 modify-listener --listener-arn ${{ secrets.ALB_LISTENER_ARN }} --default-actions Type=forward,TargetGroupArn=$NEW_TG_ARN
          
          echo "✅ Traffic switched to $NEW_ENV!"
          echo "Waiting for traffic to stabilize..."
          sleep 10

      - name: Verify ALB Traffic Switch
        env:
          ALB_URL: http://${{ secrets.ALB_DNS_NAME }}
          NEW_ENV: ${{ steps.detect.outputs.INACTIVE }}
        run: |
          echo "=========================================="
          echo "Verifying ALB is routing to $NEW_ENV..."
          echo "=========================================="
          
          for i in {1..5}; do
            RESPONSE=$(curl -s $ALB_URL/health)
            echo "Test $i: $RESPONSE"
            sleep 2
          done
          
          # Final health check via ALB
          ALB_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" $ALB_URL/health)
          if [ "$ALB_HEALTH" != "200" ]; then
            echo "❌ ALB health check failed!"
            exit 1
          fi
          
          echo "✅ ALB is successfully routing traffic to $NEW_ENV!"

      - name: Deployment Summary
        env:
          PREVIOUS_ENV: ${{ steps.detect.outputs.ACTIVE }}
          NEW_ENV: ${{ steps.detect.outputs.INACTIVE }}
          ALB_URL: http://${{ secrets.ALB_DNS_NAME }}
        run: |
          echo "=========================================="
          echo "🎉 Blue-Green Deployment Successful!"
          echo "=========================================="
          echo "📊 Deployment Summary:"
          echo "  • Previous Active: $PREVIOUS_ENV"
          echo "  • New Active: $NEW_ENV"
          echo "  • ALB Endpoint: $ALB_URL"
          echo "  • Health Check: $ALB_URL/health"
          echo "=========================================="
          echo "✅ All tests passed"
          echo "✅ Traffic switched successfully"
          echo "✅ Zero downtime achieved"
          echo "=========================================="

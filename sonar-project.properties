# SonarQube Configuration
# Note: projectKey and organization are set via workflow

# Source directories (exclude tests directory entirely)
sonar.sources=backend
sonar.exclusions=**/node_modules/**,**/prisma/migrations/**,**/tests/**,**/logs/**,**/coverage/**,**/.env*

# Test configuration
sonar.tests=backend/tests
sonar.test.inclusions=**/*.test.js,**/tests/**/*.js

# Coverage exclusions
sonar.coverage.exclusions=**/tests/**,**/prisma/**,**/node_modules/**,**/config/**

# Encoding
sonar.sourceEncoding=UTF-8

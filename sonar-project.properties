# SonarQube Configuration
sonar.projectKey=Rest_Api_Documentation
sonar.organization=your-org

# Source directories
sonar.sources=backend
sonar.tests=backend/tests

# Exclusions
sonar.exclusions=**/node_modules/**,**/prisma/migrations/**,**/logs/**,**/*.test.js,**/coverage/**,**/.env*

# Test exclusions
sonar.test.exclusions=**/node_modules/**

# Coverage exclusions
sonar.coverage.exclusions=**/tests/**,**/prisma/**,**/node_modules/**

# Language
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8

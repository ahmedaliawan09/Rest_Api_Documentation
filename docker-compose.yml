services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cart_api
    restart: always
    env_file:
      - ./backend/.env.docker
    ports:
      - "5001:5000"
    command: sh -c "npx prisma migrate deploy && npm start"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# MySQL removed - now using AWS RDS
# phpMyAdmin removed - use MySQL Workbench or AWS RDS Console to manage database
